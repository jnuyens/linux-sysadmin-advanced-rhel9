# /etc/ssh/sshd_config.d/90-hardening.conf
# Chapter 13: Linux Security - SSH Hardening Configuration
#
# Drop this file into /etc/ssh/sshd_config.d/ on RHEL 9
# Then: systemctl restart sshd
#
# RHEL 9 uses Include /etc/ssh/sshd_config.d/*.conf
# Files are processed in lexicographic order. Settings from
# earlier files take precedence (first match wins).

# Disable root login via SSH
PermitRootLogin no

# Disable password authentication (use keys only)
PasswordAuthentication no

# Never allow empty passwords
PermitEmptyPasswords no

# Disable X11 forwarding unless needed
X11Forwarding no

# Limit authentication attempts
MaxAuthTries 3

# Set login grace time (seconds to complete auth)
LoginGraceTime 30

# Limit concurrent unauthenticated connections
MaxStartups 3:50:10

# Only allow specific users or groups (uncomment and customize)
# AllowUsers admin deployer
# AllowGroups sshusers wheel

# Use only strong ciphers
Ciphers aes256-gcm@openssh.com,chacha20-poly1305@openssh.com,aes256-ctr

# Use only strong MACs
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com

# Use only strong key exchange algorithms
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org

# Log authentication events
LogLevel VERBOSE

# Disconnect idle sessions after 10 minutes
ClientAliveInterval 300
ClientAliveCountMax 2

# Disable TCP forwarding and agent forwarding unless needed
AllowTcpForwarding no
AllowAgentForwarding no

# Disable tunneling
PermitTunnel no

# Show last login date on login
PrintLastLog yes

# Use PAM (required for RHEL)
UsePAM yes

# Disable host-based authentication
HostbasedAuthentication no
IgnoreRhosts yes
