# /etc/sysctl.d/99-memory.conf - Chapter 10 Exercise
# Production memory tuning for RHEL 9 servers.
#
# Copy to /etc/sysctl.d/99-memory.conf and apply with:
#     sudo sysctl --system
#
# Verify with:
#     sysctl -a | grep -E 'swappiness|dirty|overcommit'

# ---------------------------------------------------------------
# Swap behavior
# ---------------------------------------------------------------
# 0 = only swap to avoid OOM, never proactively
# Default is 60 (far too aggressive for enterprise)
vm.swappiness = 0

# ---------------------------------------------------------------
# Dirty page ratios (percentage of total RAM)
# ---------------------------------------------------------------
# When dirty pages exceed dirty_background_ratio, the kernel starts
# flushing asynchronously in the background.
vm.dirty_background_ratio = 5

# When dirty pages exceed dirty_ratio, ALL writes block until the
# kernel has flushed enough pages. This prevents runaway caching
# on systems with large RAM.
vm.dirty_ratio = 15

# How old dirty data must be before the kernel considers it for flush
# Default: 3000 (30 seconds). Lower for write-safety.
# vm.dirty_expire_centisecs = 3000

# How often the kernel flush thread wakes up to check for dirty pages
# Default: 500 (5 seconds)
# vm.dirty_writeback_centisecs = 500

# ---------------------------------------------------------------
# Overcommit
# ---------------------------------------------------------------
# 0 = heuristic overcommit (default, good for most workloads)
# 1 = always allow (dangerous - can OOM unpredictably)
# 2 = strict - never overcommit beyond swap + ratio * physical RAM
vm.overcommit_memory = 0

# Only used when overcommit_memory = 2
# Percentage of physical RAM that can be committed
# vm.overcommit_ratio = 50

# ---------------------------------------------------------------
# Panic on OOM (optional - for clusters where restart is preferred)
# ---------------------------------------------------------------
# Uncomment to reboot instead of letting the OOM killer pick victims
# vm.panic_on_oom = 1
# kernel.panic = 10
