# /etc/logrotate.d/myapp - Chapter 11 Exercise
#
# Example logrotate configuration for a custom application.
#
# Install:
#     sudo cp logrotate-myapp.conf /etc/logrotate.d/myapp
#
# Test (dry run):
#     sudo logrotate --debug /etc/logrotate.d/myapp
#
# Force rotation:
#     sudo logrotate --force /etc/logrotate.d/myapp

/var/log/myapp/*.log {
    # Rotate daily
    daily

    # Keep 14 days of old logs
    rotate 14

    # Compress old logs (saves disk space)
    compress

    # Don't compress the most recent rotated file
    # (allows tools to read it without decompression)
    delaycompress

    # Don't error if the log file doesn't exist
    missingok

    # Don't rotate if the file is empty
    notifempty

    # Create new log file with these permissions
    create 0640 myapp myapp

    # Use date in the rotated filename (e.g., myapp.log-20260305.gz)
    dateext

    # Share a single postrotate script for all matched files
    sharedscripts

    # After rotation, tell the app to reopen its log file
    postrotate
        # Option 1: Send SIGHUP to reload (if app supports it)
        # /usr/bin/systemctl reload myapp.service > /dev/null 2>&1 || true

        # Option 2: Use systemctl kill to send signal
        /usr/bin/systemctl kill --signal=HUP myapp.service > /dev/null 2>&1 || true
    endscript
}
