# =============================================================================
# Ansible Inventory - Example for Chapter 12
# Advanced Linux System Administration - RHEL 9
# =============================================================================
# This is a static inventory file in INI format.
# Place it in your project directory and reference it with:
#   ansible-playbook -i inventory.ini site.yml
# Or set 'inventory = inventory.ini' in ansible.cfg to use it automatically.
# =============================================================================

# ---------------------------------------------------------------------------
# Web Servers
# ---------------------------------------------------------------------------
[webservers]
web01.example.com
web02.example.com

# ---------------------------------------------------------------------------
# Database Servers
# ---------------------------------------------------------------------------
[dbservers]
db01.example.com ansible_port=2222
db02.example.com

# ---------------------------------------------------------------------------
# Monitoring
# ---------------------------------------------------------------------------
[monitoring]
monitor01.example.com

# ---------------------------------------------------------------------------
# Group of Groups: all production servers
# Use [groupname:children] to nest groups
# ---------------------------------------------------------------------------
[production:children]
webservers
dbservers
monitoring

# ---------------------------------------------------------------------------
# Group Variables
# These apply to all hosts in the group
# For complex setups, use group_vars/ directory instead
# ---------------------------------------------------------------------------
[production:vars]
ansible_user=deploy
ansible_become=true
ansible_become_method=sudo

[webservers:vars]
http_port=80
https_port=443

[dbservers:vars]
db_port=5432
db_backup_dir=/var/backup/postgresql

# ---------------------------------------------------------------------------
# Lab / Development Servers
# Using IP addresses and custom SSH key
# ---------------------------------------------------------------------------
[lab]
lab01 ansible_host=192.168.56.101 ansible_user=vagrant ansible_ssh_private_key_file=~/.vagrant.d/insecure_private_key
lab02 ansible_host=192.168.56.102 ansible_user=vagrant ansible_ssh_private_key_file=~/.vagrant.d/insecure_private_key

# ---------------------------------------------------------------------------
# All environments
# ---------------------------------------------------------------------------
[all_servers:children]
production
lab
