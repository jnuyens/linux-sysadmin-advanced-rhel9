# /etc/systemd/journald.conf.d/persistent.conf - Chapter 11 Exercise
#
# Enable persistent journal with sensible defaults for production servers.
#
# Install:
#     sudo mkdir -p /etc/systemd/journald.conf.d/
#     sudo cp journald-persistent.conf /etc/systemd/journald.conf.d/persistent.conf
#     sudo systemctl restart systemd-journald
#
# Verify:
#     journalctl --disk-usage
#     ls -la /var/log/journal/

[Journal]
# Store journal on disk (survives reboots)
Storage=persistent

# Maximum disk space for journal files (default: 10% of filesystem, max 4GB)
SystemMaxUse=2G

# Always keep this much free on the filesystem
SystemKeepFree=4G

# Maximum size of individual journal files
SystemMaxFileSize=128M

# Delete entries older than this
MaxRetentionSec=3month

# Rate limiting to prevent log flooding
# Allow 10000 messages per 30 seconds per service
RateLimitIntervalSec=30s
RateLimitBurst=10000

# Compress journal files (default: yes)
Compress=yes
