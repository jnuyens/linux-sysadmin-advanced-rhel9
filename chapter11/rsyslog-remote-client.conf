# /etc/rsyslog.d/60-forward.conf - Chapter 11 Exercise
#
# Forward all logs to a central syslog server over TCP with queue buffering.
# The queue ensures logs are not lost during network outages.
#
# Install:
#     sudo cp rsyslog-remote-client.conf /etc/rsyslog.d/60-forward.conf
#     sudo rsyslogd -N 1       # test config
#     sudo systemctl restart rsyslog
#
# Verify:
#     logger -t test-forward 'Testing remote logging'
#     # Check on the remote server that the message arrived

# Forward all logs via TCP with disk-assisted queue
*.* action(
    type="omfwd"
    target="logserver.example.com"
    port="514"
    protocol="tcp"

    # Queue configuration for reliability
    queue.type="LinkedList"          # in-memory queue
    queue.fileName="fwd_queue"       # enable disk-assisted mode
    queue.maxDiskSpace="1g"          # max disk space for queue
    queue.saveOnShutdown="on"        # save queue to disk on shutdown
    queue.size="50000"               # max number of messages in queue

    # Retry on failure
    action.resumeRetryCount="-1"     # retry forever
    action.resumeInterval="30"       # wait 30 seconds between retries
)
