# =============================================================================
# ansible.cfg - Project-Level Ansible Configuration
# Advanced Linux System Administration - RHEL 9
# =============================================================================
# Place this file in the root of your Ansible project directory.
# Ansible searches for config in this order:
#   1. $ANSIBLE_CONFIG (environment variable)
#   2. ./ansible.cfg (current directory - THIS FILE)
#   3. ~/.ansible.cfg (home directory)
#   4. /etc/ansible/ansible.cfg (system-wide)
#
# Project-level config is the recommended approach because it travels
# with the code and can be version-controlled.
# =============================================================================

[defaults]
# Inventory file to use (relative to this file)
inventory = inventory.ini

# Where to find roles (relative to this file)
roles_path = roles

# Default remote user for SSH connections
remote_user = deploy

# Disable host key checking for lab environments
# WARNING: Enable this in production for security
host_key_checking = false

# Number of parallel processes (default is 5)
forks = 10

# Retry files clutter the directory - disable them
retry_files_enabled = false

# Show a nice callback with task timing
callback_whitelist = timer, profile_tasks

# Gather only the facts we need (speeds up playbook runs)
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 3600

# Output formatting
stdout_callback = yaml
display_skipped_hosts = false

# Vault password file (uncomment and set for automated runs)
# vault_password_file = ~/.vault_pass

[privilege_escalation]
# Default privilege escalation settings
become = true
become_method = sudo
become_user = root
become_ask_pass = false

[ssh_connection]
# SSH pipelining speeds up execution significantly
# Requires 'requiretty' to be disabled in sudoers on targets
pipelining = true

# Persist SSH connections for 60 seconds
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

# SCP fallback for older systems that don't support sftp
transfer_method = smart

[galaxy]
# Where to install roles from Galaxy
roles_path = roles
