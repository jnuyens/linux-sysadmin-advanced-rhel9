# Prometheus configuration for monitoring stack exercise
# Chapter 4 - Advanced Linux Sysadmin RHEL 9

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus monitors itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - host metrics
  # Uses DNS name resolution on the custom 'monitoring' network
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
