# /etc/dnf/automatic.conf - Security updates only
# Copy to /etc/dnf/automatic.conf after installing dnf-automatic

[commands]
upgrade_type = security
random_sleep = 0
download_updates = yes
apply_updates = yes

[emitters]
system_name = None
emit_via = stdio

[email]
email_from = root@localhost
email_to = root
email_host = localhost

[base]
debuglevel = 1
