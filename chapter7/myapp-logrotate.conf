# myapp-logrotate.conf - Chapter 7 Exercise: logrotate Configuration
# Place in /etc/logrotate.d/myapp
#
# This configuration rotates log files for a sample application.
# logrotate runs daily via cron.daily (or systemd timer).
#
# Key directives explained:
#   daily        - rotate every day (also: weekly, monthly)
#   rotate 14    - keep 14 rotated files before deleting
#   compress     - gzip old files to save space
#   delaycompress - don't compress yesterday's file (still being written to)
#   missingok    - don't error if the log file is missing
#   notifempty   - skip rotation if file is empty
#   create       - create new log file with these permissions after rotating
#   postrotate   - script to run after rotation (e.g., reload the app)
#   copytruncate - alternative to create: copy then truncate original
#                  (use for apps that hold the file descriptor open)

/var/log/myapp/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    postrotate
        systemctl reload myapp 2>/dev/null || true
    endscript
}

# Alternative: for apps that don't support SIGHUP reload
# /var/log/myapp/*.log {
#     daily
#     rotate 14
#     compress
#     copytruncate
#     missingok
#     notifempty
# }
