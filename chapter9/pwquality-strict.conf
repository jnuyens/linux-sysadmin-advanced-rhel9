# /etc/security/pwquality.conf - Chapter 9 Exercise
# Strict password quality settings for production servers.
#
# These settings are enforced by pam_pwquality when users change
# their own password. Root can override (will get a warning but can proceed).
#
# Copy to /etc/security/pwquality.conf to apply.

# Minimum password length (NIST 800-63B recommends 8+, we use 12)
minlen = 12

# Require at least 3 of 4 character classes (upper, lower, digit, special)
minclass = 3

# Credit for character classes (-1 means "require at least 1")
dcredit = -1    # at least 1 digit
ucredit = -1    # at least 1 uppercase
lcredit = -1    # at least 1 lowercase
ocredit = 0     # special characters: not required but counted

# Consecutive and repeated characters
maxrepeat = 3        # max 3 consecutive identical characters
maxclassrepeat = 4   # max 4 consecutive chars of the same class

# Dictionary and username checks
dictcheck = 1    # reject passwords found in cracklib dictionary
usercheck = 1    # reject passwords containing the username
enforcing = 1    # enforce the rules (0 = warn only)

# How many characters must differ from old password
difok = 5

# Reject palindromes
palindrome = 1
